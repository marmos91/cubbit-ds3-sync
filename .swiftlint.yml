# SwiftLint configuration for DS3 Drive
included:
  - DS3Drive
  - DS3DriveProvider
  - DS3Lib/Sources

excluded:
  - DS3Lib/Tests

disabled_rules:
  - trailing_whitespace
  - line_length  # SwiftFormat handles this
  - todo  # We have legitimate TODOs

opt_in_rules:
  - empty_count
  - closure_spacing
  - force_unwrapping
  - implicitly_unwrapped_optional

force_unwrapping:
  severity: error

implicitly_unwrapped_optional:
  severity: warning

file_length:
  warning: 500
  error: 1000

type_body_length:
  warning: 300
  error: 500

function_body_length:
  warning: 50
  error: 100
