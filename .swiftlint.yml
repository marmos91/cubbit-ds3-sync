# SwiftLint configuration for DS3 Drive
included:
  - DS3Drive
  - DS3DriveProvider
  - DS3Lib/Sources

excluded:
  - DS3Lib/Tests

disabled_rules:
  - trailing_whitespace
  - line_length  # SwiftFormat handles this
  - todo  # We have legitimate TODOs
  - nesting  # Nested types used for API namespace grouping
  - type_name  # Short/lowercase type names used for API namespaces
  - implicit_getter  # Minor style preference

opt_in_rules:
  # Safety
  - force_cast
  - force_unwrapping
  - implicitly_unwrapped_optional
  - identical_operands
  - unowned_variable_capture
  - weak_delegate
  - discarded_notification_center_observer
  - return_value_from_void_function
  - unhandled_throwing_task
  - no_empty_block

  # Performance
  - empty_count
  - first_where
  - last_where
  - sorted_first_last
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - flatmap_over_map_reduce
  - reduce_into

  # Clarity
  - closure_spacing
  - redundant_nil_coalescing
  - redundant_type_annotation
  - direct_return
  - shorthand_optional_binding
  - superfluous_else
  - toggle_bool
  - yoda_condition
  - fatal_error_message
  - unneeded_parentheses_in_closure_argument
  - period_spacing
  - vertical_whitespace_closing_braces
  - sorted_imports
  - private_swiftui_state

implicitly_unwrapped_optional:
  severity: warning

force_cast:
  severity: error

force_unwrapping:
  severity: error

identifier_name:
  min_length: 2
  allowed_symbols: "_"
  excluded:
    - nm
    - cb
    - s3
    - vm

file_length:
  warning: 600
  error: 1000

type_body_length:
  warning: 400
  error: 600

function_body_length:
  warning: 80
  error: 150

cyclomatic_complexity:
  warning: 15
  error: 25

function_parameter_count:
  warning: 6
  error: 8
