# SwiftLint configuration for DS3 Drive
included:
  - DS3Drive
  - DS3DriveProvider
  - DS3Lib/Sources

excluded:
  - DS3Lib/Tests

disabled_rules:
  - trailing_whitespace
  - line_length  # SwiftFormat handles this
  - todo  # We have legitimate TODOs
  - force_cast  # Pre-existing patterns, address incrementally
  - force_unwrapping  # Pre-existing patterns, address incrementally
  - nesting  # Nested types used for API namespace grouping
  - type_name  # Short/lowercase type names used for API namespaces (S3, auth, etc.)
  - implicit_getter  # Minor style preference

opt_in_rules:
  - empty_count
  - closure_spacing
  - implicitly_unwrapped_optional

implicitly_unwrapped_optional:
  severity: warning

identifier_name:
  min_length: 2
  allowed_symbols: "_"
  excluded:
    - nm
    - cb
    - s3
    - vm

file_length:
  warning: 600
  error: 1000

type_body_length:
  warning: 400
  error: 600

function_body_length:
  warning: 80
  error: 150

cyclomatic_complexity:
  warning: 15
  error: 25

function_parameter_count:
  warning: 6
  error: 8
