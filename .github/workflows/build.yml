name: Xcode - Build and Analyze

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint lint --strict --config .swiftlint.yml

  build:
    name: Build DS3Drive scheme
    runs-on: macos-26

    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies -project DS3Drive.xcodeproj -scheme DS3Drive
      - name: Build
        run: |
          xcodebuild clean build analyze \
            -project DS3Drive.xcodeproj \
            -scheme DS3Drive \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO

  build-ios:
    name: Build iOS Extension
    runs-on: macos-26
    needs: lint

    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Install iOS platform
        run: xcodebuild -downloadPlatform iOS
      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies -project DS3Drive.xcodeproj -scheme DS3DriveApp
      - name: Build DS3DriveApp for iOS Simulator
        run: |
          xcodebuild build \
            -project DS3Drive.xcodeproj \
            -scheme DS3DriveApp \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            CODE_SIGNING_ALLOWED=NO
      - name: Test DS3Lib (macOS)
        run: |
          swift test --package-path DS3Lib
      - name: Test DS3Lib on iOS Simulator
        run: |
          xcodebuild test \
            -project DS3Drive.xcodeproj \
            -scheme DS3Lib \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tail -20
        continue-on-error: true
