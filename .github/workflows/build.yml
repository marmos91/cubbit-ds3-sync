name: Xcode - Build and Analyze

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint lint --strict --config .swiftlint.yml

  build:
    name: Build DS3Drive scheme
    runs-on: macos-15

    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies -project DS3Drive.xcodeproj -scheme DS3Drive
      - name: Build
        run: |
          xcodebuild clean build analyze \
            -project DS3Drive.xcodeproj \
            -scheme DS3Drive \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO
