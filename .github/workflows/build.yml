name: Xcode - Build and Analyze

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint lint --strict --config .swiftlint.yml

  build:
    name: Build DS3Drive scheme
    runs-on: macos-26

    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            DS3Lib/.build
            ~/Library/Developer/Xcode/DerivedData/DS3Drive-*/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('DS3Lib/Package.resolved', 'DS3Drive.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-
      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies -project DS3Drive.xcodeproj -scheme DS3Drive
      - name: Build
        run: |
          xcodebuild clean build analyze \
            -project DS3Drive.xcodeproj \
            -scheme DS3Drive \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO

  test-unit:
    name: Unit Tests (DS3Lib)
    runs-on: macos-26
    needs: lint

    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: DS3Lib/.build
          key: spm-ds3lib-${{ runner.os }}-${{ hashFiles('DS3Lib/Package.resolved') }}
          restore-keys: spm-ds3lib-${{ runner.os }}-
      - name: Run unit tests
        run: swift test --package-path DS3Lib

  test-integration:
    name: Integration Tests (DS3)
    runs-on: macos-26
    needs: test-unit
    # Only run on same-repo events (protects secrets from fork PRs)
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository

    env:
      DS3_TEST_EMAIL: ${{ secrets.DS3_TEST_EMAIL }}
      DS3_TEST_PASSWORD: ${{ secrets.DS3_TEST_PASSWORD }}
      DS3_TEST_BUCKET: ${{ secrets.DS3_TEST_BUCKET }}

    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: DS3Lib/.build
          key: spm-ds3lib-${{ runner.os }}-${{ hashFiles('DS3Lib/Package.resolved') }}
          restore-keys: spm-ds3lib-${{ runner.os }}-
      - name: Run integration tests
        run: swift test --package-path DS3Lib --filter Integration

  build-ios:
    name: Build & Test iOS
    runs-on: macos-26
    needs: lint

    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Install iOS platform
        run: xcodebuild -downloadPlatform iOS
      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/DS3Drive-*/SourcePackages
          key: spm-ios-${{ runner.os }}-${{ hashFiles('DS3Drive.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-ios-${{ runner.os }}-
      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies -project DS3Drive.xcodeproj -scheme DS3DriveApp
      - name: Build DS3DriveApp for iOS Simulator
        run: |
          xcodebuild build \
            -project DS3Drive.xcodeproj \
            -scheme DS3DriveApp \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            CODE_SIGNING_ALLOWED=NO
      - name: Test DS3DriveApp on iOS Simulator
        run: |
          xcodebuild test \
            -only-testing DS3DriveAppTests \
            -project DS3Drive.xcodeproj \
            -scheme DS3DriveApp \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            CODE_SIGNING_ALLOWED=NO
