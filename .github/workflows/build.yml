name: Xcode - Build and Analyze

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint lint --strict --config .swiftlint.yml

  build:
    name: Build DS3Drive scheme
    runs-on: macos-15

    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies -project DS3Drive.xcodeproj -scheme DS3Drive
      - name: Build
        run: |
          xcodebuild clean build analyze \
            -project DS3Drive.xcodeproj \
            -scheme DS3Drive \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO

  build-ios:
    name: Build DS3Lib for iOS
    runs-on: macos-15
    needs: lint

    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Build DS3Lib for iOS
        run: |
          swift build --package-path DS3Lib --sdk $(xcrun --sdk iphonesimulator --show-sdk-path) --triple arm64-apple-ios17.0-simulator
      - name: Test DS3Lib
        run: |
          swift test --package-path DS3Lib
