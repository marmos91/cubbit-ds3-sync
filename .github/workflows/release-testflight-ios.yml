name: Release — TestFlight (iOS)

on:
  push:
    tags:
      - 'v*'

jobs:
  testflight-ios:
    name: Archive & Upload to TestFlight (iOS)
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      - name: Install iOS platform
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          mkdir -p ~/private_keys
          echo "$ASC_API_KEY_P8" | base64 --decode > ~/private_keys/AuthKey_${ASC_KEY_ID}.p8
          xcodebuild -downloadPlatform iOS \
            -authenticationKeyPath ~/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"           # e.g. v1.5.0-beta.1
          MARKETING="${TAG#v}"               # 1.5.0-beta.1
          MARKETING="${MARKETING%%-*}"       # 1.5.0
          echo "marketing=$MARKETING" >> "$GITHUB_OUTPUT"
          echo "build=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "Marketing version: $MARKETING"
          echo "Build number: ${{ github.run_number }}"

      - name: Create temporary keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Set as default so xcodebuild finds certs without prompting
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Import certificates
        env:
          APPLE_DISTRIBUTION_P12: ${{ secrets.APPLE_DISTRIBUTION_P12 }}
          APPLE_DISTRIBUTION_P12_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_P12_PASSWORD }}
        run: |
          # Apple Distribution certificate (code signing)
          CERT_PATH="$RUNNER_TEMP/apple_distribution.p12"
          echo "$APPLE_DISTRIBUTION_P12" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_DISTRIBUTION_P12_PASSWORD" \
            -T /usr/bin/codesign
          rm -f "$CERT_PATH"

          security set-key-partition-list -S apple-tool:,apple: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"

      - name: Install provisioning profiles
        env:
          IOS_APPSTORE_PROFILE_APP: ${{ secrets.IOS_APPSTORE_PROFILE_APP }}
          IOS_APPSTORE_PROFILE_EXTENSION: ${{ secrets.IOS_APPSTORE_PROFILE_EXTENSION }}
          IOS_APPSTORE_PROFILE_SHARE: ${{ secrets.IOS_APPSTORE_PROFILE_SHARE }}
        run: |
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"

          # Install profiles by UUID so xcodebuild can discover them
          for VAR_NAME in IOS_APPSTORE_PROFILE_APP IOS_APPSTORE_PROFILE_EXTENSION IOS_APPSTORE_PROFILE_SHARE; do
            PROFILE_PATH="$RUNNER_TEMP/${VAR_NAME}.mobileprovision"
            echo "${!VAR_NAME}" | base64 --decode > "$PROFILE_PATH"
            UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")
            cp "$PROFILE_PATH" "$PROFILES_DIR/${UUID}.mobileprovision"
            rm -f "$PROFILE_PATH"
            echo "Installed $VAR_NAME as ${UUID}.mobileprovision"
          done

      - name: Configure manual signing
        run: |
          PROJECT="DS3Drive.xcodeproj/project.pbxproj"

          # Set provisioning profile specifiers per target
          sed -i '' '/PRODUCT_BUNDLE_IDENTIFIER = io\.cubbit\.DS3Drive;/{
            n; n; s/PROVISIONING_PROFILE_SPECIFIER = "";/PROVISIONING_PROFILE_SPECIFIER = "DS3Drive AppStore";/
          }' "$PROJECT"

          sed -i '' '/PRODUCT_BUNDLE_IDENTIFIER = io\.cubbit\.DS3Drive\.provider;/{
            n; n; s/PROVISIONING_PROFILE_SPECIFIER = "";/PROVISIONING_PROFILE_SPECIFIER = "DS3DriveProvider AppStore";/
          }' "$PROJECT"

          sed -i '' '/PRODUCT_BUNDLE_IDENTIFIER = io\.cubbit\.DS3Drive\.share;/{
            n; n; s/PROVISIONING_PROFILE_SPECIFIER = "";/PROVISIONING_PROFILE_SPECIFIER = "DS3DriveShareExtension iOS AppStore";/
          }' "$PROJECT"

          # Verify all substitutions were applied
          for PROFILE in "DS3Drive AppStore" "DS3DriveProvider AppStore" "DS3DriveShareExtension iOS AppStore"; do
            grep -q "$PROFILE" "$PROJECT" || { echo "ERROR: profile '$PROFILE' not patched in project"; exit 1; }
          done

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project DS3Drive.xcodeproj \
            -scheme DS3DriveApp

      - name: Archive
        run: |
          xcodebuild archive \
            -project DS3Drive.xcodeproj \
            -scheme DS3DriveApp \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/DS3DriveApp.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            MARKETING_VERSION="${{ steps.version.outputs.marketing }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.build }}"

      - name: Export archive
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/DS3DriveApp.xcarchive" \
            -exportOptionsPlist ExportOptions-appstore-ios.plist \
            -exportPath "$RUNNER_TEMP/export"

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            -f "$RUNNER_TEMP/export/"*.ipa \
            -t ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --verbose 2>&1 | tee /tmp/altool.log
          grep -qi "error\|failed\|fault" /tmp/altool.log && { echo "altool upload failed"; exit 1; } || true

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -rf ~/private_keys
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision
